<!DOCTYPE html>
<html>
<head>
    <title>Employee Registration</title>
</head>

<body style="font-family: Arial; background-color:#e3f2fd;">

<div style="width:50%; margin:auto; background:white; padding:20px; margin-top:30px; border:1px solid gray;">

    <h2 style="text-align:center; color:#1565c0;">Employee Registration Form</h2>

    <form>

        <label>First Name:</label><br>
        <input type="text" placeholder="Enter First Name"><br><br>

        <label>Last Name:</label><br>
        <input type="text" placeholder="Enter Last Name"><br><br>

        <label>Email:</label><br>
        <input type="email" placeholder="Enter Email"><br><br>

        <label>Phone Number:</label><br>
        <input type="number" placeholder="Enter Phone Number"><br><br>

        <label>Gender:</label><br>
        <input type="radio" name="gender"> Male
        <input type="radio" name="gender"> Female
        <input type="radio" name="gender"> Other<br><br>

        <label>Department:</label><br>
        <select>
            <option>HR</option>
            <option>IT</option>
            <option>Finance</option>
            <option>Marketing</option>
        </select><br><br>

        <label>Skills:</label><br>
        <input type="checkbox"> Communication
        <input type="checkbox"> Programming
        <input type="checkbox"> Management<br><br>

        <label>Address:</label><br>
        <textarea rows="3" cols="30"></textarea><br><br>

        <label>Date of Joining:</label><br>
        <input type="date"><br><br>

        <input type="submit" value="Register" style="background:#1565c0; color:white; padding:8px 15px; border:none;">

        <input type="reset" value="Clear" style="padding:8px 15px;">

    </form>

</div>

</body>
</html>
