<!DOCTYPE html>
<html>
<head>
    <title>Student Form</title>
</head>
<body>

    <h1>Student Registration Form</h1>

    <form action="success.html">

        First Name: <input type="text" name="fname"><br><br>

        Last Name: <input type="text" name="lname"><br><br>

        Email: <input type="email" name="email"><br><br>

        Phone Number: <input type="tel" name="phone"><br><br>

        Address:<br>
        <textarea rows="4" cols="30" name="address"></textarea><br><br>

        Gender:
        <input type="radio" name="gender"> Male
        <input type="radio" name="gender"> Female
        <br><br>

        College:
        <select name="college">
            <option>DYPCET College</option>
            <option>KIT College</option>
            <option>RIT College</option>
        </select>
        <br><br>

        Subjects:<br>
        <input type="checkbox" name="sub"> web development<br>
        <input type="checkbox" name="sub"> app development<br>
        <input type="checkbox" name="sub"> data science<br>
        <br><br>

        Additional Info:<br>
        <textarea rows="4" cols="30" name="info"></textarea><br><br>

        <input type="submit" value="Submit">

    </form>

</body>
</html>
